<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">

    <style>
  body{
    background-image: url("https://cdn.wallpapersafari.com/64/66/DQjwep.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    font-family: Electrolize;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .box{
    background: #1f2933;
    color: white;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
  }

  h1{
    color: #ffc107;
    margin-bottom: 15px;
    text-align:center;
  }

  label{
    margin-top: 15px;
    font-size: 14px;
  }

  input{
    border-radius: 15px;
  }
  
  .btn{
    margin-top: 20px;
    background: #ffc107;
    border-radius: 6px;
  }

  div{
    margin-top: 10px;
  }
  input{
    margin-top: 10px;
  }
    </style>
</head>
<body>

<div class="box">
  <h1>Login</h1>

<label for="name">Username</label>
<input type="text" id="name" class="form-control" placeholder="Input User Here...">

<label for="word">Password</label>
<input type="password" id="word" class="form-control" placeholder="Input Password Here...">

<div>
    <input type="checkbox" id="check" onclick="rememberMe()"> Stay logged in
    <p id="glasses"></p>
</div>

<button type="button" class="btn" onclick="loginHere()">Login</button>
</div>

<script>
function loginHere(){
    let user = document.getElementById("name").value;
    let pass = document.getElementById("word").value;

    if(user === "" && pass === ""){
        alert("Please input your user and password.");
    }
    else{
        alert("You have successfully logged in, " + user + "!");
    }
}

function rememberMe(){
    let box = document.getElementById("check").checked; 

    switch(box) {
        case true:
            document.getElementById("glasses").innerHTML="Your credentials will be saved";
        break;
        default:
            document.getElementById("glasses").innerHTML="";
 }
}
</script>
</body>
</html>
